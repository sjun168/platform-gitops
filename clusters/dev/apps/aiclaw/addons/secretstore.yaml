apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: app-aiclaw-dev
  annotations:
    platform.deara.ai/temporary-exception: pilot-vault-http
spec:
  provider:
    vault:
      server: http://vault.platform.svc.cluster.local:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: app-aiclaw-dev
          serviceAccountRef:
            name: aiclaw
