apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deara-addon-access
  namespace: app-deara-dev
  annotations:
    platform.deara.ai/temporary-exception: infra/postgres:5432,clawbot/litellm-svc:4000,app-clawhost-dev/clawhost-dev:18080
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: deara
      app.kubernetes.io/instance: deara-dev
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: clawbot
      ports:
        - protocol: TCP
          port: 4000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: app-clawhost-dev
      ports:
        - protocol: TCP
          port: 18080
