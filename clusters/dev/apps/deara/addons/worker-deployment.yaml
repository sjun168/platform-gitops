apiVersion: apps/v1
kind: Deployment
metadata:
  name: deara-worker
  namespace: app-deara-dev
  labels:
    app.kubernetes.io/name: deara
    app.kubernetes.io/instance: deara-dev
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deara
      app.kubernetes.io/instance: deara-dev
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deara
        app.kubernetes.io/instance: deara-dev
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: deara
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: ghcr.io/sjun168/deara:sha-ff6c9b098917f7a793d817d8d9ce2f4a02839c70
          imagePullPolicy: IfNotPresent
          command: ["node", "worker.js"]
          envFrom:
            - configMapRef:
                name: deara-config
            - secretRef:
                name: deara-env
          env:
            - name: WORKER_POLL_INTERVAL_MS
              value: "10000"
            - name: DB_SINGLETON_ENABLED
              value: "true"
            - name: DB_MAX_CONNECTIONS
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
