apiVersion: apps/v1
kind: Deployment
metadata:
  name: deara-worker
  namespace: app-deara-prod
  labels:
    app.kubernetes.io/name: deara
    app.kubernetes.io/instance: deara-prod
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deara
      app.kubernetes.io/instance: deara-prod
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deara
        app.kubernetes.io/instance: deara-prod
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: deara
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: ghcr.io/sjun168/deara:sha-0c999f3b021aa266b56b5d4e87c7b8406508eb4b
          imagePullPolicy: IfNotPresent
          command: ["node", "worker.js"]
          envFrom:
            - configMapRef:
                name: deara-config
            - secretRef:
                name: deara-env
          env:
            - name: WORKER_POLL_INTERVAL_MS
              value: "10000"
            - name: DB_SINGLETON_ENABLED
              value: "true"
            - name: DB_MAX_CONNECTIONS
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
