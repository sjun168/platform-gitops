apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: litellm-db-egress
  namespace: clawbot
spec:
  podSelector:
    matchLabels:
      app: litellm
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
      ports:
        - protocol: TCP
          port: 5432
