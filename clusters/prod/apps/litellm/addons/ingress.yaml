apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm
  namespace: clawbot
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: llm.aiclaw.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm-svc
                port:
                  number: 4000
