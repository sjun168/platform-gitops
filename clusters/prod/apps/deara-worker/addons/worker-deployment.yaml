apiVersion: apps/v1
kind: Deployment
metadata:
  name: deara-worker
  namespace: app-deara-prod
  labels:
    app.kubernetes.io/name: deara-worker
    app.kubernetes.io/instance: deara-worker-prod
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deara-worker
      app.kubernetes.io/instance: deara-worker-prod
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deara-worker
        app.kubernetes.io/instance: deara-worker-prod
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: deara
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: ghcr.io/sjun168/deara:sha-b02fb8cc321a50734f48156c223228d3811bdfba
          imagePullPolicy: IfNotPresent
          command: ["node", "worker.js"]
          ports:
            - name: health
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: deara-config
            - secretRef:
                name: deara-env
          env:
            - name: WORKER_POLL_INTERVAL_MS
              value: "10000"
            - name: DB_SINGLETON_ENABLED
              value: "true"
            - name: DB_MAX_CONNECTIONS
              value: "1"
            - name: HEALTH_PORT
              value: "9090"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
