apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aiclaw-addon-dns
  namespace: app-aiclaw-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: aiclaw
      app.kubernetes.io/instance: aiclaw-prod
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
