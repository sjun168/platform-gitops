apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clawhost-dev
  namespace: argocd
spec:
  project: apps
  sources:
    - repoURL: https://github.com/sjun168/clawhost.git
      targetRevision: dev
      path: deploy/helm/clawhost
      helm:
        valueFiles:
          - $values/clusters/dev/apps/clawhost/values.yaml
    - repoURL: https://github.com/sjun168/platform-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: app-clawhost-dev
  syncPolicy:
    automated:
      selfHeal: true
      prune: false
    syncOptions:
      - CreateNamespace=true
