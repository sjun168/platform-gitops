apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    platform.deara.ai/temporary-exception: pilot-vault-http
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.32.0
    helm:
      values: |
        injector:
          enabled: false
        csi:
          enabled: false
        ui:
          enabled: true
        server:
          standalone:
            enabled: true
          ha:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
