apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-gitops-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sjun168/platform-gitops.git
    targetRevision: main
    path: platform/root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
